# ==========================================
# 1. GESTIONE ACCESSI (RBAC Minimo)
# ==========================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secure-app-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: app-sicura-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"] 

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-sicura-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: secure-app-sa
  namespace: default
roleRef:
  kind: Role
  name: app-sicura-role
  apiGroup: rbac.authorization.k8s.io

# ==========================================
# 2. ISOLAMENTO DI RETE E SERVIZIO
# ==========================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: secure-app
  policyTypes:
  - Ingress 
---
apiVersion: v1
kind: Service
metadata:
  name: secure-app-svc
spec:
  type: ClusterIP
  selector:
    app: secure-app
  ports:
    - port: 8080
      targetPort: 8080

# ==========================================
# 3. WORKLOAD BLINDATO (Pod Security)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app-deployment
  labels:
    app.kubernetes.io/name: secure-app
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      serviceAccountName: secure-app-sa
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: main-container
        image: nginxinc/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          readOnlyRootFilesystem: true
          #appArmorProfile:
           # type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}