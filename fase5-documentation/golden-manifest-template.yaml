# ==========================================
# GOLDEN MANIFEST - TEMPLATE DI SICUREZZA
# ==========================================

---
# 1. IDENTITA' E PERMESSI (RBAC)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-template-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: app-template-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-template-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: app-template-sa
  namespace: default
roleRef:
  kind: Role
  name: app-template-role
  apiGroup: rbac.authorization.k8s.io

---
# 2. ISOLAMENTO DI RETE E SERVIZIO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress-app-template
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: app-template
  policyTypes:
  - Ingress

---
apiVersion: v1
kind: Service
metadata:
  name: app-template-svc
spec:
  type: ClusterIP
  selector:
    app: app-template
  ports:
    - port: 8080
      targetPort: 8080

---
# 3. WORKLOAD BLINDATO (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-template-deployment
  labels:
    app.kubernetes.io/name: app-template
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-template
  template:
    metadata:
      labels:
        app: app-template
      annotations:
        container.apparmor.security.beta.kubernetes.io/main-container: runtime/default
    spec:
      serviceAccountName: app-template-sa
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: main-container
        image: nginxinc/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          readOnlyRootFilesystem: true
          # Rimuovere il commento ad appArmorProfile per gli ambienti Linux di produzione
          # appArmorProfile:
          #   type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}